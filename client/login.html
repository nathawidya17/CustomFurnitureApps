<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Debbi Meubel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Noto Serif Display"', 'Georgia', 'serif'],
                        sans:  ['"DM Sans"', 'sans-serif'],
                    },
                    colors: {
                        stone: { 50:'#f8f7f5',100:'#efefed',200:'#e5e3df',300:'#d0ceca',400:'#b0ada6',500:'#8a8a84',600:'#555550',900:'#1a1a18' },
                        rust: '#c8602a',
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-font-smoothing: antialiased; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 0.8s linear infinite; }
    </style>
</head>
<body class="bg-stone-100 font-sans text-stone-900 min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="border-b border-stone-200">
        <div class="max-w-[1400px] mx-auto px-8 md:px-12 h-16 flex items-center justify-between">
            <a href="index.html" class="font-serif text-2xl font-light tracking-wide text-stone-900">
                Debbi <span class="text-rust">Meubel</span>
            </a>
            <a href="index.html" class="text-sm text-stone-500 hover:text-stone-900 transition-colors">← Kembali ke Beranda</a>
        </div>
    </header>

    <!-- LOGIN -->
    <main class="flex-1 flex items-center justify-center px-6 py-16">
        <div class="w-full max-w-[420px] bg-white border border-stone-200 p-8 md:p-10">
            <p class="text-xs tracking-[0.14em] uppercase text-stone-400 mb-3 text-center">Selamat Datang Kembali</p>
            <h1 class="font-serif font-light text-3xl text-stone-900 text-center mb-8">Masuk ke Akun Anda</h1>

            <div id="errorMsg" class="hidden mb-5 text-sm px-4 py-3 border border-red-200 bg-red-50 text-red-600"></div>

            <div class="space-y-5">
                <div>
                    <label class="block text-xs tracking-widest uppercase text-stone-500 mb-2">Email</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="nama@email.com"
                        class="w-full px-4 py-3 border border-stone-200 bg-stone-50 text-sm focus:outline-none focus:border-stone-900 focus:bg-white transition-colors"
                    >
                </div>

                <div>
                    <label class="block text-xs tracking-widest uppercase text-stone-500 mb-2">Kata Sandi</label>
                    <div class="relative">
                        <input
                            type="password"
                            id="password"
                            placeholder="••••••••"
                            class="w-full px-4 py-3 border border-stone-200 bg-stone-50 text-sm focus:outline-none focus:border-stone-900 focus:bg-white transition-colors pr-12"
                        >
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-0 h-full flex items-center text-stone-400 hover:text-stone-700">
                            <svg id="eyeIcon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button
                    type="button"
                    onclick="handleLogin()"
                    id="btnLogin"
                    class="w-full py-3.5 bg-stone-900 text-white text-sm tracking-wide hover:bg-rust transition-colors flex items-center justify-center gap-2"
                >
                    <span id="btnText">Masuk</span>
                    <svg id="btnSpinner" class="hidden spin w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                    </svg>
                </button>
            </div>

            <p class="text-center text-sm text-stone-500 mt-7">
                Belum punya akun?
                <a href="register.html" class="text-rust hover:underline">Daftar di sini</a>
            </p>
        </div>
    </main>

    <footer class="border-t border-stone-200 py-6">
        <div class="max-w-[1400px] mx-auto px-8 md:px-12 text-center">
            <span class="text-xs text-stone-400">© 2026 Debbi Meubel — Garut, Jawa Barat</span>
        </div>
    </footer>

    <script>
        const API = 'https://debbimeubel.up.railway.app/api';

        // ── REDIRECT JIKA SUDAH LOGIN ──────────────────────────
        // Cek dua kemungkinan token: admin atau user.
        // Tidak perlu tebak role di sini — masing-masing token sudah
        // tahu kemana harus diarahkan.
        (function checkExistingSession() {
            const adminToken = localStorage.getItem('adminToken');
            const userToken  = localStorage.getItem('token');

            if (adminToken) {
                window.location.href = './admin/dashboard.html';
            } else if (userToken) {
                window.location.href = './index.html';
            }
        })();

        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // Login dengan Enter
        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleLogin();
        });

        function setLoading(isLoading) {
            const btn      = document.getElementById('btnLogin');
            const btnText  = document.getElementById('btnText');
            const spinner  = document.getElementById('btnSpinner');

            btn.disabled = isLoading;
            btn.classList.toggle('opacity-60', isLoading);
            btnText.textContent = isLoading ? 'Memproses...' : 'Masuk';
            spinner.classList.toggle('hidden', !isLoading);
        }

        function showError(message) {
            const box = document.getElementById('errorMsg');
            box.textContent = message;
            box.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.add('hidden');
        }

        async function handleLogin() {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            hideError();

            if (!email || !password) {
                showError('Email dan kata sandi wajib diisi.');
                return;
            }

            setLoading(true);

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || data.message || 'Email atau kata sandi salah.');
                    return;
                }

                if (data.user.role === 'ADMIN') {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUser',  JSON.stringify(data.user));
                    window.location.href = './admin/dashboard.html';
                } else {
                    localStorage.setItem('token',    data.token);
                    localStorage.setItem('userData', JSON.stringify(data.user));
                    window.location.href = './index.html';
                }

            } catch (e) {
                showError('Tidak dapat terhubung ke server.');
            } finally {
                setLoading(false);
            }
        }
    </script>
</body>
</html>
