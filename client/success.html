<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Diterima — Debbi Meubeul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Noto Serif Display"', 'Georgia', 'serif'],
                        sans:  ['"DM Sans"', 'sans-serif'],
                    },
                    colors: {
                        stone: { 50:'#f8f7f5',100:'#efefed',200:'#e5e3df',300:'#d0ceca',400:'#b0ada6',500:'#8a8a84',600:'#555550',900:'#1a1a18' },
                        rust: '#c8602a',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-stone-50 font-sans text-stone-900 min-h-screen flex flex-col">

    <header class="bg-white border-b border-stone-200">
        <div class="max-w-[1200px] mx-auto px-6 md:px-10 h-16 flex items-center justify-center">
            <a href="catalog.html" class="font-serif text-2xl font-light tracking-wide text-stone-900">
                Debbi <span class="text-rust">Meubel</span>
            </a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-6">
        <div class="bg-white max-w-lg w-full p-10 text-center shadow-sm border border-stone-100">
            
            <div class="w-16 h-16 bg-stone-900 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            
            <h1 class="font-serif font-light text-3xl text-stone-900 mb-3">Pesanan Diterima!</h1>
            
            <p class="text-sm text-stone-500 leading-relaxed mb-3">
                Terima kasih telah memesan. Pesanan Anda sedang menunggu konfirmasi admin.
            </p>
            
            <p class="text-sm font-mono font-bold text-stone-900 bg-stone-50 py-2 px-4 inline-block border border-stone-200 mb-8" id="displayOrderCode">
                Memuat Kode...
            </p>
            <button onclick="window.location.href='catalog.html'"
                class="w-full py-4 border border-stone-200 text-stone-600 text-[0.7rem] tracking-[0.15em] uppercase hover:bg-stone-50 transition-colors">
                Kembali ke Katalog
            </button>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
    const orderCode = sessionStorage.getItem('successOrderCode');
    const waUrl     = sessionStorage.getItem('successWaUrl');

    // Kalau diakses langsung tanpa data → redirect
    if (!orderCode || !waUrl) {
        window.location.href = 'catalog.html';
        return;
    }

    // Tampilkan dulu, BARU hapus storage
    document.getElementById('displayOrderCode').textContent = `Kode Pesanan: ${orderCode}`;
    document.getElementById('btnWA').addEventListener('click', () => {
        window.open(waUrl, '_blank');
    });

});
    </script>
</body>
</html>
