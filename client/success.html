<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Diterima — Debbi Meubeul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Noto Serif Display"', 'Georgia', 'serif'],
                        sans:  ['"DM Sans"', 'sans-serif'],
                    },
                    colors: {
                        stone: { 50:'#f8f7f5',100:'#efefed',200:'#e5e3df',300:'#d0ceca',400:'#b0ada6',500:'#8a8a84',600:'#555550',900:'#1a1a18' },
                        rust: '#c8602a',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-stone-50 font-sans text-stone-900 min-h-screen flex flex-col">

    <header class="bg-white border-b border-stone-200">
        <div class="max-w-[1200px] mx-auto px-6 md:px-10 h-16 flex items-center justify-center">
            <a href="catalog.html" class="font-serif text-2xl font-light tracking-wide text-stone-900">
                Debbi <span class="text-rust">Meubeul</span>
            </a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-6">
        <div class="bg-white max-w-lg w-full p-10 text-center shadow-sm border border-stone-100">
            
            <div class="w-16 h-16 bg-stone-900 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            
            <h1 class="font-serif font-light text-3xl text-stone-900 mb-3">Pesanan Diterima!</h1>
            
            <p class="text-sm text-stone-500 leading-relaxed mb-3">
                Terima kasih telah memesan. Pesanan Anda sedang menunggu konfirmasi admin.
            </p>
            
            <p class="text-sm font-mono font-bold text-stone-900 bg-stone-50 py-2 px-4 inline-block border border-stone-200 mb-8" id="displayOrderCode">
                Memuat Kode...
            </p>

            <div class="bg-stone-50 border border-stone-200 p-5 text-left mb-8">
                <p class="text-[0.65rem] tracking-widest uppercase text-stone-500 font-bold mb-2 flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-rust"></span> Langkah Selanjutnya
                </p>
                <p class="text-sm text-stone-600 leading-relaxed">
                    Konfirmasi pesanan Anda melalui WhatsApp admin agar pesanan segera diproses ke tahap produksi.
                </p>
            </div>

            <button id="btnWA"
                class="w-full py-4 bg-[#25D366] hover:bg-[#1ebe5c] text-white text-[0.7rem] tracking-[0.15em] uppercase transition-colors font-medium flex items-center justify-center gap-2 mb-3 shadow-sm">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Konfirmasi via WhatsApp
            </button>
            
            <button onclick="window.location.href='catalog.html'"
                class="w-full py-4 border border-stone-200 text-stone-600 text-[0.7rem] tracking-[0.15em] uppercase hover:bg-stone-50 transition-colors">
                Kembali ke Katalog
            </button>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Ambil data yang dilempar dari order.html
            const orderCode = sessionStorage.getItem('successOrderCode');
            const waUrl = sessionStorage.getItem('successWaUrl');

            // Kalau datanya nggak ada (misal diakses langsung dari URL), tendang balik ke katalog
            if (!orderCode || !waUrl) {
                window.location.href = 'catalog.html';
                return;
            }

            // Tampilkan kode order
            document.getElementById('displayOrderCode').textContent = `Kode Pesanan: ${orderCode}`;

            // Set link WhatsApp
            document.getElementById('btnWA').addEventListener('click', () => {
                window.open(waUrl, '_blank');
            });

            // Bersihkan storage biar pesanan selanjutnya fresh
            sessionStorage.removeItem('successOrderCode');
            sessionStorage.removeItem('successWaUrl');
            sessionStorage.removeItem('orderScreenshot');
        });
    </script>
</body>
</html>
