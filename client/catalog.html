<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debbi Meubel — Katalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Noto Serif Display"', 'Georgia', 'serif'],
                        sans:  ['"DM Sans"', 'sans-serif'],
                    },
                    colors: {
                        stone: { 50:'#f8f7f5',100:'#efefed',200:'#e5e3df',300:'#d0ceca',400:'#b0ada6',500:'#8a8a84',600:'#555550',900:'#1a1a18' },
                        rust: '#c8602a',
                    },
                    keyframes: {
                        fadeUp:  { '0%':{ opacity:'0', transform:'translateY(12px)' }, '100%':{ opacity:'1', transform:'translateY(0)' } },
                        shimmer: { '0%':{ backgroundPosition:'-600px 0' }, '100%':{ backgroundPosition:'600px 0' } },
                    },
                    animation: {
                        fadeUp:  'fadeUp 0.45s ease both',
                        shimmer: 'shimmer 1.4s linear infinite',
                    },
                }
            }
        }
    </script>
    <style>
        body { -webkit-font-smoothing: antialiased; }
        .skeleton { background: linear-gradient(90deg,#70706e 25%,#4c4b4a 50%,#efefed 75%); background-size:600px 100%; animation:shimmer 1.4s linear infinite; }
        @keyframes shimmer { 0%{background-position:-600px 0} 100%{background-position:600px 0} }
        .catalog-card { animation: fadeUp 0.45s ease both; }
        @keyframes fadeUp { 0%{opacity:0;transform:translateY(12px)} 100%{opacity:1;transform:translateY(0)} }
    </style>
    <script src="navbar-auth.js"></script>
</head>
<body class="bg-stone-200 font-sans text-stone-900">
    <div class="max-w-[1400px] mx-auto px-8 md:px-12 pt-12 pb-8">
        <p class="text-xs tracking-[0.14em] uppercase text-stone-400 mb-3">Koleksi Produk</p>
        <h1 class="font-serif font-light text-4xl md:text-5xl text-stone-900">
            Pilih model, <em class="italic text-rust">sesuaikan</em> sesukamu.
        </h1>
    </div>

    <div class="max-w-[1400px] mx-auto px-8 md:px-12"><hr class="border-stone-200"></div>

    <div class="max-w-[1400px] mx-auto px-8 md:px-12 py-10 pb-24">
        <div id="catalogList" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 bg-stone-200"></div>
    </div>

    <div class="max-w-[1400px] mx-auto px-8 md:px-12 pb-16 flex items-center justify-center gap-1">
        <button class="w-9 h-9 flex items-center justify-center border border-stone-200 text-stone-400 hover:border-stone-900 hover:text-stone-900 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="w-9 h-9 flex items-center justify-center border border-stone-900 bg-stone-900 text-white text-xs">1</button>
        <button class="w-9 h-9 flex items-center justify-center border border-stone-200 text-stone-500 hover:border-stone-900 hover:text-stone-900 transition-colors text-xs">2</button>
        <span class="px-1 text-stone-300 text-sm">···</span>
        <button class="w-9 h-9 flex items-center justify-center border border-stone-200 text-stone-400 hover:border-stone-900 hover:text-stone-900 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
        </button>
    </div>

    <div class="max-w-[1400px] mx-auto px-8 md:px-12"><hr class="border-stone-200"></div>
    <footer class="max-w-[1400px] mx-auto px-8 md:px-12 py-6 flex flex-col md:flex-row items-center justify-between gap-2">
        <span class="text-xs text-stone-400">© 2026 Debbi Meubel</span>
        <span class="text-xs text-stone-400">Garut, Jawa Barat</span>
    </footer>

    <script>
        // Konfigurasi URL Base API Backend mu
        const API_BASE_URL = 'https://debbimeubel.up.railway.app/api';

        const BADGE_CYCLE  = [null, null, 'new', 'premium', null];
        const BADGE_LABELS = { new: 'Baru', premium: 'Premium' };

        function formatIDR(n) {
            return new Intl.NumberFormat('id-ID', { style:'currency', currency:'IDR', minimumFractionDigits:0 }).format(n);
        }

        // Tampilan loading ambalan skeleton
        function skeletonCard() {
            return `<div class="bg-white border border-stone-200">
                <div class="aspect-square w-full skeleton"></div>
                <div class="p-4 space-y-2">
                    <div class="skeleton h-3 w-4/5"></div>
                    <div class="skeleton h-3 w-2/5 mt-1"></div>
                </div>
            </div>`;
        }

        // Generate Card HTML Berdasarkan Data Murni dari Database
        function createCard(item, index) {
            const badgeKey = BADGE_CYCLE[index % BADGE_CYCLE.length];
            const delay = (index % 10) * 40;

            const badgeHTML = badgeKey
                ? `<div class="absolute top-2.5 left-2.5 text-[0.6rem] tracking-widest uppercase px-2 py-0.5 text-white font-medium"
                        style="background:${badgeKey === 'new' ? '#c8602a' : '#1a1a18'}">${BADGE_LABELS[badgeKey]}</div>`
                : '';

            // MODIFIKASI DISINI: Jika field thumbnail ada isinya di DB, panggil URL backend port 3001
            const imgHTML = item.thumbnail
                ? `<img src="http://localhost:3001/uploads/${item.thumbnail}" alt="${item.name}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">`
                : `<svg class="w-14 h-14 text-stone-300 transition-transform duration-500 group-hover:scale-105" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 64 64">
                       <path d="M32 8L8 20v24l24 12 24-12V20L32 8z"/><path d="M32 8v36M8 20l24 12 24-12"/>
                   </svg>`;

            return `
            <div class="catalog-card bg-white group cursor-pointer hover:bg-stone-50 transition-colors border border-stone-200"
                 style="animation-delay:${delay}ms"
                 onclick="window.location.href='detail.html?slug=${item.slug}'">
                <div class="relative aspect-square bg-white overflow-hidden flex items-center justify-center">
                    ${badgeHTML}
                    ${imgHTML}
                </div>
                <div class="p-4 border-t border-stone-200">
                    <p class="text-sm text-stone-800 leading-snug mb-1.5 line-clamp-2">${item.name}</p>
                    <p class="font-serif font-light text-lg text-stone-900">${formatIDR(item.basePrice)}</p>
                </div>
            </div>`;
        }

        // Fungsi Ambil Data dari Route Backend GET /api/products
        async function loadCatalog() {
            const grid = document.getElementById('catalogList');
            
            // Pasang loading skeleton dulu biar rapi pas nunggu response API
            grid.innerHTML = Array(10).fill(0).map(skeletonCard).join('');

            try {
                const res = await fetch(`${API_BASE_URL}/products`);
                if (!res.ok) throw new Error('Gagal fetch data dari server API');
                
                const products = await res.json();

                if (products && products.length > 0) {
                    grid.innerHTML = products.map((item, i) => createCard(item, i)).join('');
                } else {
                    grid.innerHTML = `<div class="col-span-full py-20 text-center text-sm text-stone-400">Tidak ada produk aktif di database.</div>`;
                }
            } catch (error) {
                console.error(error);
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-sm text-red-500 font-medium">Gagal memuat katalog dari database. Pastikan server backend Anda menyala.</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', loadCatalog);
    </script>
</body>
</html>
