<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <title>3D Rak Kustomisasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%;
            background: #e67e22; cursor: pointer; border: 2px solid white; margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 8px; background: #e5e7eb; border-radius: 4px;
        }
        body { overflow: hidden; }
        
    </style>
</head>
<body class="bg-[#f3f4f6]">
    <div id="app-container" class="flex h-screen w-screen">
        <div id="controls" class="w-[380px] h-full bg-white shadow-2xl z-20 flex flex-col overflow-y-auto">
            <div class="bg-[#e67e22] text-white p-8">
                <a href="catalog.html" class="flex items-center text-white/90 hover:text-white mb-6 text-sm font-medium">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Kembali ke Katalog
                </a>
                <h3 class="text-3xl font-bold tracking-tight">Custom Rak</h3>
                <p class="text-white/80 mt-2 text-base">Sesuaikan dengan kebutuhan Anda</p>
            </div>

            <div class="p-8 space-y-10">
                <section id="dimensionSection">
                    <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">DIMENSI</h4>
                    <div class="space-y-6">
                        <div class="control-group">
                            <label class="flex justify-between items-center mb-4 text-gray-600 font-medium">
                                <span>Lebar</span>
                                <span class="text-[#e67e22] font-bold text-lg"><span id="widthValue">120</span> cm</span>
                            </label>
                            <input type="range" id="width" min="50" max="300" step="1" value="120" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                        </div>

                        <div class="control-group">
                            <label class="flex justify-between items-center mb-4 text-gray-600 font-medium">
                                <span>Tinggi</span>
                                <span class="text-[#e67e22] font-bold text-lg"><span id="heightValue">150</span> cm</span>
                            </label>
                            <input type="range" id="height" min="50" max="300" step="1" value="150" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                        </div>

                        <div class="control-group">
                            <label class="flex justify-between items-center mb-4 text-gray-600 font-medium">
                                <span>Kedalaman</span>
                                <span class="text-[#e67e22] font-bold text-lg"><span id="depthValue">100</span> cm</span>
                            </label>
                            <input type="range" id="depth" min="30" max="200" step="1" value="100" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                        </div>
                    </div>
                </section>

                <hr class="border-gray-100">

            <section id="rackLayoutControls">
    <h4 id="layoutTitle" class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">KONFIGURASI LAYOUT</h4>
    <div class="grid grid-cols-2 gap-6" id="layoutGrid">
        </div>
</section>
<section class="border-t pt-6">
    <h4 class="text-xs font-bold text-gray-400 uppercase mb-4 tracking-widest">Finishing</h4>
    
    <!-- Toggle PVC / HPL -->
    <div class="flex gap-2 mb-4">
        <button id="btnPVC" onclick="setFinishingType('pvc')" 
            class="flex-1 py-2 rounded-lg text-sm font-semibold border-2 border-[#e67e22] bg-[#e67e22] text-white transition-all">
            PVC
        </button>
        <button id="btnHPL" onclick="setFinishingType('hpl')" 
            class="flex-1 py-2 rounded-lg text-sm font-semibold border-2 border-gray-200 bg-white text-gray-500 transition-all">
            HPL
        </button>
    </div>

    <!-- Opsi Tekstur PVC -->
    <div id="pvcOptions" class="grid grid-cols-3 gap-2">
        <button onclick="selectTexture('pvc', './models/tekstur/warna putih.jpg', this)" 
                class="texture-btn flex flex-col items-center gap-1 p-1 rounded-lg border-2 border-transparent hover:border-[#e67e22] transition-all">
                <img src="./models/tekstur/warna putih.jpg" class="w-full h-14 object-cover rounded-md"/>
                <span class="text-[10px] text-gray-500 font-medium">Putih </span>   
        </button>
        <button onclick="selectTexture('pvc', './models/tekstur/warna abu.avif', this)" 
            class="texture-btn flex flex-col items-center gap-1 p-1 rounded-lg border-2 border-transparent hover:border-[#e67e22] transition-all">
            <img src="./models/tekstur/warna abu.avif" class="w-full h-14 object-cover rounded-md"/>
            <span class="text-[10px] text-gray-500 font-medium">Abu</span>
        </button>
        <button onclick="selectTexture('pvc', './models/tekstur/summer blue.avif', this)" 
            class="texture-btn flex flex-col items-center gap-1 p-1 rounded-lg border-2 border-transparent hover:border-[#e67e22] transition-all">
            <img src="./models/tekstur/summer blue.avif" class="w-full h-14 object-cover rounded-md"/>
            <span class="text-[10px] text-gray-500 font-medium">Summer Blue</span>
        </button>
         <button onclick="selectTexture('pvc', './models/tekstur/ultramarine.jpg', this)" 
            class="texture-btn flex flex-col items-center gap-1 p-1 rounded-lg border-2 border-transparent hover:border-[#e67e22] transition-all">
            <img src="./models/tekstur/ultramarine.jpg" class="w-full h-14 object-cover rounded-md"/>
            <span class="text-[10px] text-gray-500 font-medium">Ultramarine</span>
        </button>
        <button onclick="selectTexture('pvc', './models/tekstur/kayu03.jpg', this)" 
            class="texture-btn flex flex-col items-center gap-1 p-1 rounded-lg border-2 border-transparent hover:border-[#e67e22] transition-all">
            <img src="./models/tekstur/kayu03.jpg" class="w-full h-14 object-cover rounded-md"/>
            <span class="text-[10px] text-gray-500 font-medium">Motif Kayu</span>
        </button>
        
    </div>

    <!-- Opsi Tekstur HPL -->
    <div id="hplOptions" class="grid grid-cols-3 gap-2 hidden">
        <button onclick="selectTexture('hpl', './models/tekstur/oak_putih.jpg', this)" 
            class="texture-btn flex flex-col items-center gap-1 p-1 rounded-lg border-2 border-transparent hover:border-[#e67e22] transition-all">
            <img src="./models/tekstur/oak_putih.jpg" class="w-full h-14 object-cover rounded-md"/>
            <span class="text-[10px] text-gray-500 font-medium">Oak Putih</span>
        </button>
        <button onclick="selectTexture('hpl', './models/tekstur/oak_abucorak.png', this)" 
            class="texture-btn flex flex-col items-center gap-1 p-1 rounded-lg border-2 border-transparent hover:border-[#e67e22] transition-all">
            <img src="./models/tekstur/oak_abucorak.png" class="w-full h-14 object-cover rounded-md"/>
            <span class="text-[10px] text-gray-500 font-medium">Abu Terang</span>
        </button>
        <button onclick="selectTexture('hpl', './models/tekstur/oak_gelap.png', this)" 
            class="texture-btn flex flex-col items-center gap-1 p-1 rounded-lg border-2 border-transparent hover:border-[#e67e22] transition-all">
            <img src="./models/tekstur/oak_gelap.png" class="w-full h-14 object-cover rounded-md"/>
            <span class="text-[10px] text-gray-500 font-medium">Abu Gelap</span>
        </button>
        
    </div>
</section>

<script>
    function changeProductColor(color) {
        if (window.appChangeColor) window.appChangeColor(color);
    }

    function setFinishingType(type) {
        const isPVC = type === 'pvc';
        document.getElementById('pvcOptions').classList.toggle('hidden', !isPVC);
        document.getElementById('hplOptions').classList.toggle('hidden', isPVC);
        document.getElementById('btnPVC').className = `flex-1 py-2 rounded-lg text-sm font-semibold border-2 transition-all ${isPVC ? 'border-[#e67e22] bg-[#e67e22] text-white' : 'border-gray-200 bg-white text-gray-500'}`;
        document.getElementById('btnHPL').className = `flex-1 py-2 rounded-lg text-sm font-semibold border-2 transition-all ${!isPVC ? 'border-[#e67e22] bg-[#e67e22] text-white' : 'border-gray-200 bg-white text-gray-500'}`;
        // clear selected state
        document.querySelectorAll('.texture-btn').forEach(b => b.classList.remove('border-[#e67e22]', '!border-[#e67e22]'));
    }

    function selectTexture(type, path, btn) {
        // highlight selected
        const container = type === 'pvc' ? 'pvcOptions' : 'hplOptions';
        document.querySelectorAll(`#${container} .texture-btn`).forEach(b => {
            b.classList.remove('border-[#e67e22]');
            b.classList.add('border-transparent');
        });
        btn.classList.remove('border-transparent');
        btn.classList.add('border-[#e67e22]');
        if (window.appChangeTexture) window.appChangeTexture(path);
    }
</script>

<script>
    function changeProductColor(color) {
        if (window.appChangeColor) window.appChangeColor(color);
    }
</script>

            
            </div>
        </div>

        <div id="canvas-area" class="flex-1 relative bg-[#f8fafc]">
            <div class="absolute top-6 right-6 bg-black/40 backdrop-blur-md p-5 rounded-2xl text-white z-30 min-w-[220px]">
                <div class="flex items-center gap-4">
                    <div class="bg-white/20 p-2.5 rounded-xl">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase tracking-wider text-white/60">Estimasi Harga</p>
                        <p id="totalPrice" class="text-2xl font-bold tracking-tight text-white">Rp0</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="./custom.js"></script>

    <script>
        const syncValues = () => {
            const controls = [
                { input: 'width', display: 'widthValue' },
                { input: 'height', display: 'heightValue' },
                { input: 'depth', display: 'depthValue' },
                { input: 'rackCols', display: 'rackColsValue' },
                { input: 'rackRows', display: 'rackRowsValue' }
            ];

            controls.forEach(item => {
                const inputEl = document.getElementById(item.input);
                const displayEl = document.getElementById(item.display);
                if (inputEl && displayEl) {
                    displayEl.innerText = inputEl.value;
                    inputEl.addEventListener('input', () => { displayEl.innerText = inputEl.value; });
                }
            });
        };
        window.addEventListener('DOMContentLoaded', syncValues);
    </script>
</body>
</html>
