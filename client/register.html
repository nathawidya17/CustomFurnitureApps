<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar — Debbi Meubel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Noto Serif Display"', 'Georgia', 'serif'],
                        sans:  ['"DM Sans"', 'sans-serif'],
                    },
                    colors: {
                        stone: { 50:'#f8f7f5',100:'#efefed',200:'#e5e3df',300:'#d0ceca',400:'#b0ada6',500:'#8a8a84',600:'#555550',900:'#1a1a18' },
                        rust: '#c8602a',
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-font-smoothing: antialiased; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 0.8s linear infinite; }
    </style>
</head>
<body class="bg-stone-100 font-sans text-stone-900 min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="border-b border-stone-200">
        <div class="max-w-[1400px] mx-auto px-8 md:px-12 h-16 flex items-center justify-between">
            <a href="landingpage.html" class="font-serif text-2xl font-light tracking-wide text-stone-900">
                Debbi <span class="text-rust">Meubel</span>
            </a>
            <a href="landingpage.html" class="text-sm text-stone-500 hover:text-stone-900 transition-colors">← Kembali ke Beranda</a>
        </div>
    </header>

    <!-- REGISTER -->
    <main class="flex-1 flex items-center justify-center px-6 py-16">
        <div class="w-full max-w-[440px] bg-white border border-stone-200 p-8 md:p-10">
            <p class="text-xs tracking-[0.14em] uppercase text-stone-400 mb-3 text-center">Bergabung Bersama Kami</p>
            <h1 class="font-serif font-light text-3xl text-stone-900 text-center mb-8">Buat Akun Baru</h1>

            <div id="alertBox" class="hidden mb-5 text-sm px-4 py-3 border"></div>

            <form id="registerForm" class="space-y-5">
                <div>
                    <label for="name" class="block text-xs tracking-widest uppercase text-stone-500 mb-2">Nama Lengkap</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        required
                        placeholder="Nama Anda"
                        class="w-full px-4 py-3 border border-stone-200 bg-stone-50 text-sm focus:outline-none focus:border-stone-900 focus:bg-white transition-colors"
                    >
                </div>

                <div>
                    <label for="email" class="block text-xs tracking-widest uppercase text-stone-500 mb-2">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        placeholder="nama@email.com"
                        class="w-full px-4 py-3 border border-stone-200 bg-stone-50 text-sm focus:outline-none focus:border-stone-900 focus:bg-white transition-colors"
                    >
                </div>

                <div>
                    <label for="phone" class="block text-xs tracking-widest uppercase text-stone-500 mb-2">No. WhatsApp (Wajib No WA Aktif)</label>
                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        required
                        placeholder="08xxxxxxxxxx"
                        class="w-full px-4 py-3 border border-stone-200 bg-stone-50 text-sm focus:outline-none focus:border-stone-900 focus:bg-white transition-colors"
                    >
                </div>

                <div>
                    <label for="password" class="block text-xs tracking-widest uppercase text-stone-500 mb-2">Kata Sandi</label>
                    <div class="relative">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            minlength="6"
                            placeholder="Minimal 6 karakter"
                            class="w-full px-4 py-3 border border-stone-200 bg-stone-50 text-sm focus:outline-none focus:border-stone-900 focus:bg-white transition-colors pr-12"
                        >
                        <button type="button" id="togglePassword" class="absolute right-3 top-0 h-full flex items-center text-stone-400 hover:text-stone-700">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div>
                    <label for="confirmPassword" class="block text-xs tracking-widest uppercase text-stone-500 mb-2">Konfirmasi Kata Sandi</label>
                    <div class="relative">
                        <input
                            type="password"
                            id="confirmPassword"
                            name="confirmPassword"
                            required
                            placeholder="Ulangi kata sandi"
                            class="w-full px-4 py-3 border border-stone-200 bg-stone-50 text-sm focus:outline-none focus:border-stone-900 focus:bg-white transition-colors pr-12"
                        >
                        <button type="button" id="toggleConfirmPassword" class="absolute right-3 top-0 h-full flex items-center text-stone-400 hover:text-stone-700">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button
                    type="submit"
                    id="submitBtn"
                    class="w-full py-3.5 bg-stone-900 text-white text-sm tracking-wide hover:bg-rust transition-colors flex items-center justify-center gap-2"
                >
                    <span id="btnText">Daftar Sekarang</span>
                    <svg id="btnSpinner" class="hidden spin w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                    </svg>
                </button>
            </form>

            <p class="text-center text-sm text-stone-500 mt-7">
                Sudah punya akun?
                <a href="login.html" class="text-rust hover:underline">Masuk di sini</a>
            </p>
        </div>
    </main>

    <footer class="border-t border-stone-200 py-6">
        <div class="max-w-[1400px] mx-auto px-8 md:px-12 text-center">
            <span class="text-xs text-stone-400">© 2026 Debbi Meubel — Garut, Jawa Barat</span>
        </div>
    </footer>

<script>
        // ============================
        // KONFIGURASI
        // ============================
        const API = 'http://localhost:3001/api';
        const REGISTER_ENDPOINT = `${API}/auth/register`;

        // ============================
        // REDIRECT JIKA SUDAH LOGIN
        // ============================
        (function checkExistingSession() {
            const adminToken = localStorage.getItem('adminToken');
            const userToken  = localStorage.getItem('token');
            if (adminToken) window.location.href = 'admin/dashboard.html';
            else if (userToken) window.location.href = 'landingpage.html';
        })();

        // ============================
        // TOGGLE LIHAT PASSWORD
        // ============================
        document.getElementById('togglePassword').addEventListener('click', () => {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        });
        document.getElementById('toggleConfirmPassword').addEventListener('click', () => {
            const input = document.getElementById('confirmPassword');
            input.type = input.type === 'password' ? 'text' : 'password';
        });

        // ============================
        // UI HELPERS
        // ============================
        function showAlert(message, type = 'error') {
            const box = document.getElementById('alertBox');
            box.textContent = message;
            box.classList.remove('hidden');
            box.className = type === 'error'
                ? 'mb-5 text-sm px-4 py-3 border border-red-200 bg-red-50 text-red-600'
                : 'mb-5 text-sm px-4 py-3 border border-green-200 bg-green-50 text-green-700';
        }
        function hideAlert() {
            document.getElementById('alertBox').classList.add('hidden');
        }
        function setLoading(isLoading) {
            const btn      = document.getElementById('submitBtn');
            const btnText  = document.getElementById('btnText');
            const spinner  = document.getElementById('btnSpinner');
            btn.disabled = isLoading;
            btn.classList.toggle('opacity-60', isLoading);
            btnText.textContent = isLoading ? 'Memproses...' : 'Daftar Sekarang';
            spinner.classList.toggle('hidden', !isLoading);
        }

        // ============================
        // LOGIC REGISTER
        // ============================
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            const name            = document.getElementById('name').value.trim();
            const email           = document.getElementById('email').value.trim();
            const phone           = document.getElementById('phone').value.trim();
            const password        = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validasi dasar di sisi client
            if (!name || !email || !phone || !password || !confirmPassword) {
                showAlert('Semua field wajib diisi.');
                return;
            }
            if (!/^08\d{8,11}$/.test(phone)) {
                showAlert('Format no. WhatsApp tidak valid. Contoh: 081234567890');
                return;
            }
            if (password.length < 6) {
                showAlert('Kata sandi minimal 6 karakter.');
                return;
            }
            if (password !== confirmPassword) {
                showAlert('Konfirmasi kata sandi tidak cocok.');
                return;
            }

            setLoading(true);

            try {
                const res = await fetch(REGISTER_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || data.message || 'Pendaftaran gagal. Coba lagi.');
                }

                showAlert('Pendaftaran berhasil! Mengarahkan ke halaman login...', 'success');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1200);

            } catch (err) {
                console.error(err);
                showAlert(err.message || 'Terjadi kesalahan saat mendaftar.');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
